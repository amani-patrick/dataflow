services:
  backend:
    image: ghcr.io/amani-patrick/dataflow-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - uploads:/app/uploads
    networks:
      - dataflow

  frontend:
    image: ghcr.io/amani-patrick/dataflow-frontend:latest
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dataflow

volumes:
  uploads:

networks:
  dataflow:
    driver: bridge
